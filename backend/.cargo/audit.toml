[advisories]
# sqlx-mysql remains listed in Cargo.lock as an optional sqlx dependency, but
# every workspace sqlx dependency disables default features and enables only
# PostgreSQL support. `cargo tree -i sqlx-mysql --target all` must remain empty.
ignore = [
  "RUSTSEC-2023-0071",

  # testcontainers pulls tokio-tar and currently has no fixed release. It is
  # used only by ignored Docker-backed integration tests and api-infra testkit.
  "RUSTSEC-2025-0111",
]
