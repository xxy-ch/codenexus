# Online Judge - Docker Compose Configuration
#
# Services:
#   - postgres: PostgreSQL database (port 5432)
#   - redis: Redis cache/message queue (port 6379)
#   - api: REST API service (port 3000)
#   - frontend: Vite dev server (port 5173)
#   - feature-gateway: Feature flag resolution service (port 3001)
#   - judge-worker: Code execution service
#   - llm-worker: LLM analysis worker (consumes from Redis Streams)
#
# Required production environment variables:
#   - POSTGRES_PASSWORD
#   - DATABASE_URL=postgresql://postgres:<POSTGRES_PASSWORD>@postgres:5432/online_judge
#   - JWT_SECRET
#   - WORKER_SECRET
#   - PUBLIC_REGISTRATION_ORGANIZATION_ID
#
# Usage:
#   Start all services:
#     docker compose up -d
#
#   Start specific service:
#     docker compose up -d postgres redis
#
#   Stop services:
#     docker compose down
#
#   Reset volumes (delete all data):
#     docker compose down -v
#
#   View logs:
#     docker compose logs -f [service]
#
#   Verify services are healthy:
#     docker compose ps
#
# Development:
#   Run API locally (without Docker):
#     DATABASE_URL=postgresql://postgres:postgres@localhost:5432/online_judge \
#     REDIS_URL=redis://localhost:6379 \
#     JWT_SECRET=dev-secret \
#     cargo run --bin api
#
#   Run frontend locally:
#     npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: online-judge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: online_judge
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d online_judge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: online-judge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      # P16: Provide auth to redis-cli via env var so the healthcheck no longer
      # passes the password on the command line (visible in `ps` / process list).
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      # P16: redis-cli reads REDISCLI_AUTH from the environment automatically,
      # so the password never appears in the command line or process list.
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    container_name: online-judge-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WORKER_SECRET: ${WORKER_SECRET:?WORKER_SECRET is required}
      PUBLIC_REGISTRATION_ORGANIZATION_ID: ${PUBLIC_REGISTRATION_ORGANIZATION_ID:?PUBLIC_REGISTRATION_ORGANIZATION_ID is required}
      PUBLIC_REGISTRATION_CAMPUS_ID: ${PUBLIC_REGISTRATION_CAMPUS_ID:-}
      PUBLIC_REGISTRATION_GRADE_ID: ${PUBLIC_REGISTRATION_GRADE_ID:-}
      API_BIND_ADDRESS: 0.0.0.0:3000
      FEATURE_GATEWAY_URL: http://feature-gateway:3001
      RUST_LOG: api=debug,tower_http=debug,axum=trace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      feature-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: online-judge-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_WS_BASE_URL: ws://localhost:3000
    depends_on:
      api:
        condition: service_healthy

  feature-gateway:
    build:
      context: ./backend
      dockerfile: feature-gateway/Dockerfile
    container_name: online-judge-feature-gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      FEATURE_GATEWAY_ENABLED: "true"
      GATEWAY_BIND_ADDRESS: 0.0.0.0:3001
      WORKER_SECRET: ${WORKER_SECRET:?WORKER_SECRET is required}
      RUST_LOG: feature_gateway=debug
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f -H \"Authorization: Bearer $$WORKER_SECRET\" http://localhost:3001/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  judge-worker:
    build:
      context: ./backend
      dockerfile: judge-worker/Dockerfile
    container_name: online-judge-judge-worker
    restart: unless-stopped
    user: "0:0"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      API_URL: http://api:3000
      WORKER_SECRET: ${WORKER_SECRET:?WORKER_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroup: host
    cap_add:
      - SYS_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f judge-worker >/dev/null && python3 -c \"import socket; s=socket.create_connection(('redis', 6379), 3); s.sendall(b'PING\\r\\n'); assert b'PONG' in s.recv(16); s.close()\" && curl -f http://api:3000/health/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  llm-worker:
    build:
      context: ./backend
      dockerfile: llm-worker/Dockerfile
    container_name: online-judge-llm-worker
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      LLM_API_URL: ${LLM_API_URL:-http://host.docker.internal:11434}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-coder}
      LLM_TIMEOUT_SECS: "60"
      LLM_MAX_RETRIES: "3"
      RUST_LOG: llm_worker=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f llm-worker >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
