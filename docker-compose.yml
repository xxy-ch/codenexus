# Online Judge - Docker Compose Configuration
#
# Services:
#   - postgres: PostgreSQL database (port 5432)
#   - redis: Redis cache/message queue (port 6379)
#   - api: REST API service (port 3000)
#   - frontend: Vite dev server (port 5173)
#   - judge-worker: Code execution service
#
# Environment Variables Required for API:
#   - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/online_judge
#   - REDIS_URL=redis://localhost:6379
#   - JWT_SECRET=your-secret-key
#
# Usage:
#   Start all services:
#     docker compose up -d
#
#   Start specific service:
#     docker compose up -d postgres redis
#
#   Stop services:
#     docker compose down
#
#   Reset volumes (delete all data):
#     docker compose down -v
#
#   View logs:
#     docker compose logs -f [service]
#
#   Verify services are healthy:
#     docker compose ps
#
# Development:
#   Run API locally (without Docker):
#     DATABASE_URL=postgresql://postgres:postgres@localhost:5432/online_judge \
#     REDIS_URL=redis://localhost:6379 \
#     JWT_SECRET=dev-secret \
#     cargo run --bin api
#
#   Run frontend locally:
#     npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: online-judge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: online_judge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d online_judge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: online-judge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    container_name: online-judge-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/online_judge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-default_jwt_secret_change_me}
      API_BIND_ADDRESS: 0.0.0.0:3000
      RUST_LOG: api=debug,tower_http=debug,axum=trace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: online-judge-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_WS_BASE_URL: ws://localhost:3000
      VITE_ENABLE_MOCK_DATA: "false"
    depends_on:
      api:
        condition: service_healthy

  judge-worker:
    build:
      context: ./backend
      dockerfile: judge-worker/Dockerfile
    container_name: online-judge-judge-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/online_judge
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pgrep", "-f", "judge-worker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
