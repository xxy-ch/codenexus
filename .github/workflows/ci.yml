name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: "${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        # TODO(Phase 5): Switch to -D warnings after dead code cleanup (SEC-04)
        run: cargo clippy --all-targets -- -W unused-imports -W unused-variables
        env:
          DATABASE_URL: postgres://dummy:dummy@localhost/dummy

      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://dummy:dummy@localhost/dummy

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest --run

      - name: Build
        run: npm run build

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f api/Dockerfile . --no-cache

      - name: Build Judge Worker image
        run: docker build -f judge-worker/Dockerfile . --no-cache

      - name: Build Frontend image
        run: docker build -f frontend/Dockerfile ./frontend --no-cache
