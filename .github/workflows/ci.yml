name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: "${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        # TODO(Phase 5): Switch to -D warnings after dead code cleanup (SEC-04)
        run: cargo clippy --all-targets -- -W unused-imports -W unused-variables
        env:
          DATABASE_URL: postgres://dummy:dummy@localhost/dummy

      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://dummy:dummy@localhost/dummy

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest --run

      - name: Build
        run: npm run build

  integration:
    name: Rust Integration (#[ignore] tests with PostgreSQL + Redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: onlinejudge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: "${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Run migrations on test database
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/onlinejudge_test
        run: |
          cargo run -p api -- --migrate-only 2>/dev/null || true
          # Also create migration_mappings table for migration-tool tests
          PGPASSWORD=postgres psql -h localhost -U postgres -d onlinejudge_test -c \
            "CREATE TABLE IF NOT EXISTS migration_mappings (entity_type TEXT NOT NULL, old_id TEXT NOT NULL, new_id TEXT NOT NULL, PRIMARY KEY (entity_type, old_id));" || true

      - name: Run ignored integration tests
        run: cargo test --workspace -- --ignored
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/onlinejudge_test
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: test-jwt-secret-for-ci
          WORKER_SECRET: test-worker-secret-for-ci

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f backend/api/Dockerfile ./backend --no-cache

      - name: Build Judge Worker image
        run: docker build -f backend/judge-worker/Dockerfile ./backend --no-cache

      - name: Build Frontend image
        run: docker build -f frontend/Dockerfile ./frontend --no-cache
